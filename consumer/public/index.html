<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Shaped Products Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

    <h1>Shaped Products</h1>

    <button onclick="loadProducts()">
        Load Products
    </button>

    <pre id="output">
Click the button to load shaped JSON.
  </pre>

    <script>
        function loadProducts() {

            fetch('http://localhost:3000/file-generated')
                .then(response => response.json())
                .then(data => {
                    const formatted = JSON.stringify(data, null, 2);
                    document.getElementById('output').textContent = formatted;
                })
                .catch(error => {
                    document.getElementById('output').textContent =
                        'Error: ' + error.message;
                });
        }
    </script>

</body>

</html>
