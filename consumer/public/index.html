<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Product Viewer</title>
    <style>

    </style>
</head>

<body>

    <div class="header">
        <h1>Product View Selector</h1>
    </div>

    <div class ="buttons">
    <button onclick="loadView('customer')">
        Load Customer View
    </button>

    <button onclick="loadView('warehouse')">
        Load Warehouse View
    </button>

    <button onclick="loadView('stream')">
        Load Stream View
    </button>
    </div>

    <div class="output-container">
        <pre id="output">
            Click a button to load data.
        </pre>
        <ul id="stream-view"></ul>
    </div>

    <script>
        //variable to hold SSE connection outside of function to help with view cleanup
        let source = null;

        function loadView(viewType) {

            // Close existing SSE connection if it exists and clear the stream view
            if (source) {
                source.close();
                source = null;
                document.getElementById('stream-view').innerHTML = '';
            }

            if (viewType === 'stream') {
                document.getElementById('output').textContent = '';
                source = new EventSource('http://localhost:3000/stream');
                source.onmessage = function (event) {
                    const list = document.getElementById('stream-view');
                    const item = document.createElement('li');
                    item.textContent = event.data;
                    list.appendChild(item);
                };
                source.onerror = function (err) { console.log('SSE error', err); };
            }
            else {
                document.getElementById('output').textContent = '';
                const endpoint = `http://localhost:3000/file-generated?view=${viewType}`;
                fetch(endpoint)
                    .then(response => response.json())
                    .then(data => {
                        const formatted = JSON.stringify(data, null, 2);
                        document.getElementById("output").textContent = formatted;
                    })
                    .catch(error => {
                        document.getElementById("output").textContent =
                            "Error loading data: " + error.message;
                    });
            }
        }
    </script>

</body>

</html>
